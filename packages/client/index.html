<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>OpenSettlers</title>
    <meta name="theme-color" content="#6b4c11" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Settlers" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overscroll-behavior: none; }
      body { background: #1a1a2e; color: #eee; font-family: system-ui, sans-serif; }
      #root { height: 100dvh; display: flex; flex-direction: column; }

      /* UI theme variables — game board SVG colours are unaffected */
      :root {
        --ui-bg: #e8e1d5;
        --ui-panel: #ffffff;
        --ui-panel-active: #fff8ee;
        --ui-text: #2c2516;
        --ui-text-muted: #7a6d5e;
        --ui-text-faint: #9a8a7a;
        --ui-border: #c9bfae;
        --ui-border-light: #e8e1d5;
        --ui-topbar: #6b4c11;
        --ui-topbar-border: #a07828;
        --ui-topbar-text: #e8d5a8;
        --ui-topbar-strong: #ffffff;
        --ui-overlay-bg: rgba(255,255,255,0.55);
        --ui-card-bg: #fffdf7;
        --ui-card-border: #c9bfae;
        --ui-btn-muted: #e8e1d5;
        --ui-btn-muted-text: #5a4a35;
        --ui-input-bg: #f2ede4;
        --ui-input-text: #6b4c11;
        --ocean-bg: #1a6b9a;
      }
      body.dark {
        --ui-bg: #141820;
        --ui-panel: #1c2438;
        --ui-panel-active: #232d44;
        --ui-text: #d4e0f0;
        --ui-text-muted: #8090b0;
        --ui-text-faint: #5a6880;
        --ui-border: #252d42;
        --ui-border-light: #1c2438;
        --ui-topbar: #0d1220;
        --ui-topbar-border: #252d42;
        --ui-topbar-text: #8090b0;
        --ui-topbar-strong: #d4e0f0;
        --ui-overlay-bg: rgba(255,255,255,0.05);
        --ui-card-bg: #1a2440;
        --ui-card-border: #2a3f6a;
        --ui-btn-muted: #1e2a42;
        --ui-btn-muted-text: #8090b0;
        --ui-input-bg: #1a2440;
        --ui-input-text: #8090b0;
        --ocean-bg: #0b3a52;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
